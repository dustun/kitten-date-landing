<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пойдёшь со мной на свидание? 🐱</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

<!-- Котёнок -->
<svg id="kitten" width="360" height="360" viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg">
    <title>Милый розовый котёнок</title>
    <path d="M85 125 L45 55 L125 115 Z" fill="#ff9eb7" stroke="#2c3e50" stroke-width="18" stroke-linejoin="round"/>
    <path d="M255 125 L295 55 L215 115 Z" fill="#ff9eb7" stroke="#2c3e50" stroke-width="18" stroke-linejoin="round"/>
    <ellipse cx="170" cy="185" rx="105" ry="98" fill="#ff9eb7" stroke="#2c3e50" stroke-width="22"/>
    <ellipse id="left-eye" cx="120" cy="165" rx="29" ry="37" fill="#ffffff" stroke="#2c3e50" stroke-width="10"/>
    <ellipse id="right-eye" cx="220" cy="165" rx="29" ry="37" fill="#ffffff" stroke="#2c3e50" stroke-width="10"/>
    <circle id="left-pupil" cx="120" cy="165" r="14" fill="#2c3e50"/>
    <circle id="right-pupil" cx="220" cy="165" r="14" fill="#2c3e50"/>
    <path d="M150 200 L170 215 L190 200" fill="#ff4d8c" stroke="#2c3e50" stroke-width="6"/>
    <path d="M150 225 Q170 240 190 225" fill="none" stroke="#2c3e50" stroke-width="7" stroke-linecap="round"/>
    <line x1="85" y1="210" x2="45" y2="198" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    <line x1="85" y1="220" x2="42" y2="220" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    <line x1="85" y1="230" x2="47" y2="242" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    <line x1="255" y1="210" x2="295" y2="198" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    <line x1="255" y1="220" x2="298" y2="220" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    <line x1="255" y1="230" x2="293" y2="242" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="95" cy="195" rx="19" ry="11" fill="#ff6fa6" opacity="0.4"/>
    <ellipse cx="245" cy="195" rx="19" ry="11" fill="#ff6fa6" opacity="0.4"/>
</svg>

<!-- Главная карточка -->
<div class="card">
    <h1>Пойдёшь со мной на свидание? 🐱</h1>
    <p class="subtitle">Котёнок очень-очень надеется на «Да» 💕</p>

    <div class="buttons">
        <button class="yes" id="yesBtn">Да, конечно! 💖</button>
        <button class="no" id="noBtn">Может быть в другой раз… 😿</button>
    </div>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal">
    <div class="modal-content">
        <p id="modal-text" class="modal-text"></p>
        <div class="modal-buttons">
            <button id="modal-yes" class="modal-btn yes">Да, пойду! 💕</button>
            <button id="modal-no" class="modal-btn no">Нет… 😔</button>
        </div>
    </div>
</div>

<script src="/scripts/script.js"></script>
</body>
</html>
